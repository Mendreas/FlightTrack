name: Criar Instalador Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Criar instalador .exe
        run: npm run dist

      - name: Publicar instalador
        uses: actions/upload-artifact@v4
        with:
          name: Flight-Track-Viewer-Installer
          path: dist/*.exe
          retention-days: 30
